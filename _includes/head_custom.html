{% raw %}
<link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<style>
#accessibility-bar {
  position: fixed;
  top: 8px;
  right: 12px;
  z-index: 9999;
  display: flex;
  gap: 6px;
  font-size: 13px;
}

#accessibility-bar button, #accessibility-bar select {
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
  background: #f5f5f5;
  color: #333;
}

body.dark-mode {
  background-color: #1e1e1e !important;
  color: #d4d4d4 !important;
}
body.dark-mode .side-bar {
  background-color: #252525 !important;
  color: #d4d4d4 !important;
}
body.dark-mode .main-content {
  background-color: #1e1e1e !important;
}
body.dark-mode a {
  color: #6db3f2 !important;
}
body.dark-mode .site-title {
  color: #d4d4d4 !important;
}
body.dark-mode .search-input {
  background-color: #333 !important;
  color: #d4d4d4 !important;
  border-color: #555 !important;
}
body.dark-mode .navigation-list-link {
  color: #d4d4d4 !important;
}
body.dark-mode #accessibility-bar button,
body.dark-mode #accessibility-bar select {
  background: #333 !important;
  color: #d4d4d4 !important;
  border-color: #555 !important;
}
body.dark-mode table th,
body.dark-mode table td {
  border-color: #555 !important;
  color: #d4d4d4 !important;
}
body.dark-mode table th {
  background-color: #2a2a2a !important;
}
body.dark-mode code {
  background-color: #2a2a2a !important;
  color: #d4d4d4 !important;
}

body.font-hyperlegible,
body.font-hyperlegible * {
  font-family: 'Atkinson Hyperlegible', sans-serif !important;
}
body.font-opendyslexic,
body.font-opendyslexic * {
  font-family: 'Open Dyslexic', sans-serif !important;
}

.collapsible-heading {
  cursor: pointer;
  user-select: none;
  position: relative;
  padding-left: 1.2em;
}
.collapsible-heading::before {
  content: '\25B8';
  position: absolute;
  left: 0;
  transition: transform 0.2s;
}
.collapsible-heading.open::before {
  transform: rotate(90deg);
}
.collapsible-content.collapsed {
  display: none;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var bar = document.createElement('div');
  bar.id = 'accessibility-bar';
  bar.innerHTML = '<button id="dark-toggle" title="Mode sombre">&#x1F319;</button><select id="font-select" title="Police"><option value="default">Police par d\u00e9faut</option><option value="hyperlegible">Atkinson Hyperlegible (malvoyants)</option><option value="opendyslexic">OpenDyslexic (dyslexie)</option></select>';
  document.body.appendChild(bar);

  var darkBtn = document.getElementById('dark-toggle');
  var isDark = localStorage.getItem('darkMode') === 'true';

  function applyDark(d) {
    if (d) {
      document.body.classList.add('dark-mode');
      darkBtn.innerHTML = '&#x2600;&#xFE0F;';
      darkBtn.title = 'Mode clair';
    } else {
      document.body.classList.remove('dark-mode');
      darkBtn.innerHTML = '&#x1F319;';
      darkBtn.title = 'Mode sombre';
    }
  }
  applyDark(isDark);

  darkBtn.addEventListener('click', function() {
    isDark = !isDark;
    localStorage.setItem('darkMode', String(isDark));
    applyDark(isDark);
  });

  var fontSelect = document.getElementById('font-select');
  var savedFont = localStorage.getItem('fontChoice') || 'default';
  fontSelect.value = savedFont;

  function applyFont(f) {
    document.body.classList.remove('font-hyperlegible', 'font-opendyslexic');
    if (f === 'hyperlegible') { document.body.classList.add('font-hyperlegible'); }
    if (f === 'opendyslexic') { document.body.classList.add('font-opendyslexic'); }
  }
  applyFont(savedFont);

  fontSelect.addEventListener('change', function() {
    localStorage.setItem('fontChoice', this.value);
    applyFont(this.value);
  });

  var content = document.querySelector('.main-content');
  if (!content) { return; }

  var headings = content.querySelectorAll('h2, h3, h4');
  if (headings.length < 3) { return; }

  var i, heading, level, wrapper, sibling, next, siblingLevel;

  for (i = 0; i < headings.length; i++) {
    heading = headings[i];
    heading.classList.add('collapsible-heading', 'open');
    level = parseInt(heading.tagName.charAt(1), 10);
    wrapper = document.createElement('div');
    wrapper.className = 'collapsible-content';
    sibling = heading.nextElementSibling;

    while (sibling) {
      if (sibling.tagName && /^H[1-6]$/.test(sibling.tagName)) {
        siblingLevel = parseInt(sibling.tagName.charAt(1), 10);
        if (siblingLevel <= level) { break; }
      }
      next = sibling.nextElementSibling;
      wrapper.appendChild(sibling);
      sibling = next;
    }

    if (wrapper.children.length > 0) {
      heading.parentNode.insertBefore(wrapper, heading.nextSibling);
    }

    heading.addEventListener('click', function() {
      this.classList.toggle('open');
      var c = this.nextElementSibling;
      if (c && c.classList.contains('collapsible-content')) {
        c.classList.toggle('collapsed');
      }
    });
  }
});
</script>
{% endraw %}
