{% raw %}
<link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Bold.woff') format('woff');
  font-weight: bold; font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Italic.woff') format('woff');
  font-weight: normal; font-style: italic;
}

/* === POLICE === */
body {
  font-family: 'Libertinus Serif', serif !important;
  font-size: 1.1rem;
  line-height: 1.7;
}
.side-bar, .side-bar * { font-size: 0.85rem; }
body.font-hyperlegible, body.font-hyperlegible * { font-family: 'Atkinson Hyperlegible', sans-serif !important; }
body.font-hyperlegible { font-size: 1.05rem; }
body.font-opendyslexic, body.font-opendyslexic * { font-family: 'OpenDyslexic', sans-serif !important; }
body.font-opendyslexic { font-size: 1rem; }

/* === VARIABLES DE THEME === */
body {
  --bg: #faf8f5;
  --bg-sidebar: #f3f0eb;
  --text: #2d2d2d;
  --text-muted: #888;
  --h1-color: #5b3e96;
  --h2-color: #2a7a6f;
  --h3-color: #b5651d;
  --h4-color: #3a5ea6;
  --link: #7253ed;
  --link-hover: #5a3fd6;
  --accent: #7253ed;
  --border: #e0dcd6;
  --quote-bg: #f0eee9;
  --quote-border: #7253ed;
  --em-color: #8b5e3c;
  --page-marker: #b0a090;
  --hr-color: #d0c8be;
  --fn-color: #7253ed;
  --strong-color: #3d2f5c;
  --bar-bg: #f5f5f5;
  --bar-text: #333;
  --bar-border: #ccc;
  --panel-bg: #fff;
  --toc-link: #555;
}

body.theme-dark {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --text: #d4d4d4;
  --text-muted: #666;
  --h1-color: #c586c0;
  --h2-color: #4ec9b0;
  --h3-color: #ce9178;
  --h4-color: #569cd6;
  --link: #6db3f2;
  --link-hover: #8cc5ff;
  --accent: #c586c0;
  --border: #30363d;
  --quote-bg: #1c2028;
  --quote-border: #c586c0;
  --em-color: #dcdcaa;
  --page-marker: #555;
  --hr-color: #30363d;
  --fn-color: #c586c0;
  --strong-color: #e2e2e2;
  --bar-bg: #21262d;
  --bar-text: #d4d4d4;
  --bar-border: #444;
  --panel-bg: #161b22;
  --toc-link: #aaa;
}

body.theme-cb-light {
  --bg: #faf8f5;
  --bg-sidebar: #f3f0eb;
  --text: #2d2d2d;
  --text-muted: #888;
  --h1-color: #0072B2;
  --h2-color: #E69F00;
  --h3-color: #CC79A7;
  --h4-color: #56B4E9;
  --link: #0072B2;
  --link-hover: #005080;
  --accent: #0072B2;
  --border: #e0dcd6;
  --quote-bg: #f0eee9;
  --quote-border: #0072B2;
  --em-color: #D55E00;
  --page-marker: #b0a090;
  --hr-color: #d0c8be;
  --fn-color: #0072B2;
  --strong-color: #2d2d2d;
  --bar-bg: #f5f5f5;
  --bar-text: #333;
  --bar-border: #ccc;
  --panel-bg: #fff;
  --toc-link: #555;
}

body.theme-cb-dark {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --text: #d4d4d4;
  --text-muted: #666;
  --h1-color: #56B4E9;
  --h2-color: #E69F00;
  --h3-color: #CC79A7;
  --h4-color: #009E73;
  --link: #56B4E9;
  --link-hover: #7cc8f0;
  --accent: #56B4E9;
  --border: #30363d;
  --quote-bg: #1c2028;
  --quote-border: #56B4E9;
  --em-color: #F0E442;
  --page-marker: #555;
  --hr-color: #30363d;
  --fn-color: #56B4E9;
  --strong-color: #e2e2e2;
  --bar-bg: #21262d;
  --bar-text: #d4d4d4;
  --bar-border: #444;
  --panel-bg: #161b22;
  --toc-link: #aaa;
}

/* === APPLICATION === */
body { background-color: var(--bg) !important; color: var(--text) !important; }
.side-bar { background-color: var(--bg-sidebar) !important; border-right: 1px solid var(--border) !important; }
.side-bar, .side-bar * { color: var(--text) !important; }
.site-title { color: var(--accent) !important; }
.main-content { background-color: var(--bg) !important; }

/* Titres colores */
.main-content h1 { color: var(--h1-color) !important; }
.main-content h2 { color: var(--h2-color) !important; }
.main-content h3 { color: var(--h3-color) !important; }
.main-content h4 { color: var(--h4-color) !important; }

/* Liens */
.main-content a { color: var(--link) !important; }
.main-content a:hover { color: var(--link-hover) !important; }

/* Italiques (termes philosophiques) */
.main-content em { color: var(--em-color); }

/* Gras */
.main-content strong { color: var(--strong-color); }

/* Citations */
.main-content blockquote {
  background-color: var(--quote-bg) !important;
  border-left: 4px solid var(--quote-border) !important;
  color: var(--text) !important;
  padding: 12px 16px;
}

/* Lignes horizontales */
.main-content hr {
  border: none;
  border-top: 2px solid var(--hr-color);
}

/* Notes de bas de page */
.main-content .footnote, .main-content sup a { color: var(--fn-color) !important; }

/* Tableaux */
.main-content table th {
  background-color: var(--bg-sidebar) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.main-content table td { color: var(--text) !important; border-color: var(--border) !important; }

/* Code */
.main-content code { background-color: var(--bg-sidebar) !important; color: var(--text) !important; }

/* Recherche — corriger le bloc blanc */
.search, .search-input, .search-input-wrap, .search-results-wrap,
.main-header, .aux-nav {
  background-color: var(--bg-sidebar) !important;
  color: var(--text) !important;
}
.search-input { border-color: var(--border) !important; }
.search-overlay { background-color: var(--bg) !important; }
.search-result { border-color: var(--border) !important; }
.search-result-title { color: var(--link) !important; }
.search-result-doc { color: var(--text-muted) !important; }

/* Navigation */
.navigation-list-link { color: var(--text) !important; }
.navigation-list-link.active { color: var(--accent) !important; font-weight: 600; }
.breadcrumb-nav, .breadcrumb-nav * { color: var(--text-muted) !important; }
.breadcrumb-nav a { color: var(--link) !important; }

/* Pied de page principal */
.main-content-wrap + *, footer { color: var(--text-muted) !important; background-color: var(--bg) !important; }
.main-content-wrap + * a, footer a { color: var(--link) !important; }

/* Cacher le footer de la sidebar */
.site-footer.d-md-block { display: none !important; }

/* Tout le reste du body */
#main-content-wrap, .page-content { background-color: var(--bg) !important; }

/* === PANNEAU PLAN === */
#toc-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 10000; }
#toc-overlay.open { display: block; }
#toc-panel { position: fixed; top: 0; right: -400px; width: 380px; max-width: 85vw; height: 100%; background: var(--panel-bg); z-index: 10001; overflow-y: auto; padding: 24px 20px; box-shadow: -4px 0 20px rgba(0,0,0,0.15); transition: right 0.25s ease; font-size: 0.88rem; line-height: 1.5; color: var(--text); }
#toc-panel.open { right: 0; }
#toc-panel .toc-panel-title { font-weight: 700; font-size: 1rem; color: var(--accent); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
#toc-panel ul { list-style: none; padding-left: 0; margin: 0; }
#toc-panel ul ul { padding-left: 16px; margin-top: 2px; }
#toc-panel li { margin-bottom: 4px; }
#toc-panel a { color: var(--toc-link) !important; text-decoration: none; display: block; padding: 2px 0; }
#toc-panel a:hover { color: var(--accent) !important; }
#toc-panel .toc-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); padding: 4px 8px; }
#toc-panel .toc-close:hover { color: var(--text); }

/* === PANNEAU REGLAGES === */
#settings-btn {
  position: fixed; bottom: 12px; right: 12px; z-index: 9999;
  border: 1px solid var(--bar-border); border-radius: 4px;
  padding: 6px 14px; cursor: pointer; font-size: 13px;
  background: var(--accent); color: #fff; font-weight: 600;
  font-family: sans-serif !important;
}
#settings-btn:hover { opacity: 0.85; }

#settings-panel {
  display: none; position: fixed; bottom: 48px; right: 12px;
  z-index: 9998; background: var(--panel-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  font-size: 13px; font-family: sans-serif !important;
  min-width: 200px;
}
#settings-panel.open { display: block; }
#settings-panel label {
  display: block; margin-bottom: 4px; font-weight: 600;
  color: var(--text-muted); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em;
}
#settings-panel select, #settings-panel button {
  width: 100%; margin-bottom: 12px;
  border: 1px solid var(--bar-border); border-radius: 4px;
  padding: 5px 8px; cursor: pointer; font-size: 13px;
  background: var(--bar-bg); color: var(--bar-text);
  font-family: sans-serif !important;
}
#settings-panel button { background: var(--accent); color: #fff; font-weight: 600; border-color: var(--accent); }
#settings-panel button:hover { opacity: 0.85; }
#settings-panel .settings-divider { border-top: 1px solid var(--border); margin: 8px 0 12px; }

/* === SECTIONS PLIABLES === */
.collapsible-heading { cursor: pointer; user-select: none; position: relative; padding-left: 1.2em; }
.collapsible-heading::before { content: '\25B8'; position: absolute; left: 0; transition: transform 0.2s; }
.collapsible-heading.open::before { transform: rotate(90deg); }
.collapsible-content.collapsed { display: none; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  /* --- Cacher "Table of contents" auto --- */
  var h2s = document.querySelectorAll('.main-content h2');
  for (var t = 0; t < h2s.length; t++) {
    if (h2s[t].textContent.trim() === 'Table of contents') {
      var nxt = h2s[t].nextElementSibling;
      h2s[t].style.display = 'none';
      if (nxt && nxt.tagName === 'UL') { nxt.style.display = 'none'; }
    }
  }

  /* --- Construire le plan --- */
  var content = document.getElementById('main-content');
  if (!content) { content = document.querySelector('.main-content'); }
  var hasToc = false;

  if (content) {
    var pageH = content.querySelectorAll('h1, h2, h3, h4');
    if (pageH.length >= 4) {
      hasToc = true;
      var overlay = document.createElement('div');
      overlay.id = 'toc-overlay';
      document.body.appendChild(overlay);

      var panel = document.createElement('div');
      panel.id = 'toc-panel';
      var closeBtn = document.createElement('button');
      closeBtn.className = 'toc-close';
      closeBtn.innerHTML = '&times;';
      panel.appendChild(closeBtn);
      var pTitle = document.createElement('div');
      pTitle.className = 'toc-panel-title';
      pTitle.textContent = 'Plan';
      panel.appendChild(pTitle);

      var tocList = document.createElement('ul');
      var stack = [tocList];
      var lastLvl = 1;
      for (var p = 0; p < pageH.length; p++) {
        var hd = pageH[p];
        var lv = parseInt(hd.tagName.charAt(1), 10);
        var tx = hd.textContent.trim();
        if (!tx) { continue; }
        if (!hd.id) { hd.id = 'heading-' + p; }
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + hd.id;
        a.textContent = tx;
        a.addEventListener('click', function() { closeToc(); });
        if (lv > lastLvl) {
          var sub = document.createElement('ul');
          if (stack[stack.length-1].lastChild) { stack[stack.length-1].lastChild.appendChild(sub); }
          stack.push(sub);
        } else if (lv < lastLvl) {
          for (var d = 0; d < lastLvl - lv; d++) { if (stack.length > 1) stack.pop(); }
        }
        li.appendChild(a);
        stack[stack.length-1].appendChild(li);
        lastLvl = lv;
      }
      panel.appendChild(tocList);
      document.body.appendChild(panel);

      function closeToc() { panel.classList.remove('open'); overlay.classList.remove('open'); }
      overlay.addEventListener('click', closeToc);
      closeBtn.addEventListener('click', closeToc);
    }
  }

  /* --- Bouton et panneau Reglages --- */
  var settingsBtn = document.createElement('button');
  settingsBtn.id = 'settings-btn';
  settingsBtn.textContent = 'R\u00e9glages';
  document.body.appendChild(settingsBtn);

  var sp = document.createElement('div');
  sp.id = 'settings-panel';
  var spHtml = '';
  if (hasToc) {
    spHtml += '<button id="toc-open-btn">Plan du texte</button>';
    spHtml += '<button id="toggle-all-btn">Tout replier</button>';
    spHtml += '<div class="settings-divider"></div>';
  }
  spHtml += '<label>Affichage</label>';
  spHtml += '<select id="theme-select"><option value="light">Clair</option><option value="dark">Sombre</option><option value="cb-light">Daltonien jour</option><option value="cb-dark">Daltonien nuit</option></select>';
  spHtml += '<label>Police</label>';
  spHtml += '<select id="font-select"><option value="default">Libertinus Serif</option><option value="hyperlegible">Atkinson Hyperlegible</option><option value="opendyslexic">OpenDyslexic</option></select>';
  sp.innerHTML = spHtml;
  document.body.appendChild(sp);

  settingsBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    sp.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!sp.contains(e.target) && e.target !== settingsBtn) { sp.classList.remove('open'); }
  });

  /* Plan depuis reglages */
  if (hasToc) {
    document.getElementById('toc-open-btn').addEventListener('click', function() {
      sp.classList.remove('open');
      document.getElementById('toc-panel').classList.add('open');
      document.getElementById('toc-overlay').classList.add('open');
    });
  }

  /* Theme */
  var themeSelect = document.getElementById('theme-select');
  var savedTheme = localStorage.getItem('themeChoice') || 'light';
  themeSelect.value = savedTheme;
  function applyTheme(t) {
    document.body.classList.remove('theme-dark', 'theme-cb-light', 'theme-cb-dark');
    if (t !== 'light') { document.body.classList.add('theme-' + t); }
  }
  applyTheme(savedTheme);
  themeSelect.addEventListener('change', function() {
    localStorage.setItem('themeChoice', this.value);
    applyTheme(this.value);
  });

  /* Police */
  var fontSelect = document.getElementById('font-select');
  var savedFont = localStorage.getItem('fontChoice') || 'default';
  fontSelect.value = savedFont;
  function applyFont(f) {
    document.body.classList.remove('font-hyperlegible', 'font-opendyslexic');
    if (f === 'hyperlegible') { document.body.classList.add('font-hyperlegible'); }
    if (f === 'opendyslexic') { document.body.classList.add('font-opendyslexic'); }
  }
  applyFont(savedFont);
  fontSelect.addEventListener('change', function() {
    localStorage.setItem('fontChoice', this.value);
    applyFont(this.value);
  });

  /* --- Sections pliables --- */
  if (content) {
    var allH = content.querySelectorAll('h1, h2, h3, h4');
    if (allH.length >= 4) {
      for (var i = 0; i < allH.length; i++) {
        var hh = allH[i];
        hh.classList.add('collapsible-heading', 'open');
        var lv = parseInt(hh.tagName.charAt(1), 10);
        var wr = document.createElement('div');
        wr.className = 'collapsible-content';
        var sib = hh.nextElementSibling;
        while (sib) {
          if (sib.tagName && /^H[1-6]$/.test(sib.tagName)) {
            if (parseInt(sib.tagName.charAt(1), 10) <= lv) { break; }
          }
          var nxs = sib.nextElementSibling;
          wr.appendChild(sib);
          sib = nxs;
        }
        if (wr.children.length > 0) { hh.parentNode.insertBefore(wr, hh.nextSibling); }
        hh.addEventListener('click', function() {
          this.classList.toggle('open');
          var c = this.nextElementSibling;
          if (c && c.classList.contains('collapsible-content')) { c.classList.toggle('collapsed'); }
        });
      }

      /* Tout plier/deplier */
      var allOpen = true;
      var togBtn = document.getElementById('toggle-all-btn');
      if (togBtn) {
        togBtn.addEventListener('click', function() {
          var secs = content.querySelectorAll('.collapsible-content');
          var hds = content.querySelectorAll('.collapsible-heading');
          if (allOpen) {
            for (var j = 0; j < secs.length; j++) { secs[j].classList.add('collapsed'); }
            for (var k = 0; k < hds.length; k++) { hds[k].classList.remove('open'); }
            togBtn.textContent = 'Tout d\u00e9plier';
            allOpen = false;
          } else {
            for (var j = 0; j < secs.length; j++) { secs[j].classList.remove('collapsed'); }
            for (var k = 0; k < hds.length; k++) { hds[k].classList.add('open'); }
            togBtn.textContent = 'Tout replier';
            allOpen = true;
          }
        });
      }
    }
  }
});
</script>
{% endraw %}
