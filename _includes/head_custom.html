{% raw %}
<link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Italic.woff') format('woff');
  font-weight: normal;
  font-style: italic;
}

/* Police par defaut : Libertinus Serif */
body {
  font-family: 'Libertinus Serif', serif !important;
  font-size: 1.1rem;
  line-height: 1.7;
}
.side-bar,
.side-bar * {
  font-size: 0.85rem;
}

/* Sans-serif */
body.font-sans,
body.font-sans * {
  font-family: 'Inter', sans-serif !important;
}
body.font-sans {
  font-size: 1rem;
}

/* Malvoyants */
body.font-hyperlegible,
body.font-hyperlegible * {
  font-family: 'Atkinson Hyperlegible', sans-serif !important;
}
body.font-hyperlegible {
  font-size: 1.05rem;
}

/* Dyslexie */
body.font-opendyslexic,
body.font-opendyslexic * {
  font-family: 'OpenDyslexic', sans-serif !important;
}
body.font-opendyslexic {
  font-size: 1rem;
}

/* Panneau Plan */
#toc-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
  z-index: 10000;
}
#toc-overlay.open {
  display: block;
}

#toc-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 380px;
  max-width: 85vw;
  height: 100%;
  background: #fff;
  z-index: 10001;
  overflow-y: auto;
  padding: 24px 20px;
  box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
  transition: right 0.25s ease;
  font-size: 0.88rem;
  line-height: 1.5;
}
#toc-panel.open {
  right: 0;
}
#toc-panel .toc-panel-title {
  font-weight: 700;
  font-size: 1rem;
  color: #7253ed;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid #7253ed;
}
#toc-panel ul {
  list-style: none;
  padding-left: 0;
  margin: 0;
}
#toc-panel ul ul {
  padding-left: 16px;
  margin-top: 2px;
}
#toc-panel li {
  margin-bottom: 4px;
}
#toc-panel a {
  color: #333;
  text-decoration: none;
  display: block;
  padding: 2px 0;
}
#toc-panel a:hover {
  color: #7253ed;
}
#toc-panel .toc-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: #999;
  padding: 4px 8px;
}
#toc-panel .toc-close:hover {
  color: #333;
}

/* Cacher le footer de la sidebar */
.site-footer.d-md-block { display: none !important; }

/* Barre accessibilite */
#accessibility-bar {
  position: fixed;
  bottom: 12px;
  right: 12px;
  z-index: 9999;
  display: flex;
  gap: 6px;
  font-size: 13px;
}
#accessibility-bar select,
#accessibility-bar button {
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
  background: #f5f5f5;
  color: #333;
  font-family: sans-serif !important;
}
#accessibility-bar button#toc-toggle {
  background: #7253ed;
  color: #fff;
  border-color: #7253ed;
  font-weight: 600;
}
#accessibility-bar button#toc-toggle:hover {
  background: #5a3fd6;
}

/* Sections pliables */
.collapsible-heading {
  cursor: pointer;
  user-select: none;
  position: relative;
  padding-left: 1.2em;
}
.collapsible-heading::before {
  content: '\25B8';
  position: absolute;
  left: 0;
  transition: transform 0.2s;
}
.collapsible-heading.open::before {
  transform: rotate(90deg);
}
.collapsible-content.collapsed {
  display: none;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  /* --- Cacher "Table of contents" auto --- */
  var tocs = document.querySelectorAll('.main-content h2');
  for (var t = 0; t < tocs.length; t++) {
    if (tocs[t].textContent.trim() === 'Table of contents') {
      var tocNext = tocs[t].nextElementSibling;
      tocs[t].style.display = 'none';
      if (tocNext && tocNext.tagName === 'UL') {
        tocNext.style.display = 'none';
      }
    }
  }

  /* --- Construire le plan depuis les titres de la page --- */
  var content = document.getElementById('main-content');
  if (!content) { content = document.querySelector('.main-content'); }

  var hasToc = false;

  if (content) {
    var pageHeadings = content.querySelectorAll('h1, h2, h3, h4');
    if (pageHeadings.length >= 4) {
      hasToc = true;

      /* Creer le panneau */
      var overlay = document.createElement('div');
      overlay.id = 'toc-overlay';
      document.body.appendChild(overlay);

      var panel = document.createElement('div');
      panel.id = 'toc-panel';

      var closeBtn = document.createElement('button');
      closeBtn.className = 'toc-close';
      closeBtn.innerHTML = '&times;';
      panel.appendChild(closeBtn);

      var panelTitle = document.createElement('div');
      panelTitle.className = 'toc-panel-title';
      panelTitle.textContent = 'Plan';
      panel.appendChild(panelTitle);

      var tocList = document.createElement('ul');
      var stack = [tocList];
      var lastLevel = 1;

      for (var p = 0; p < pageHeadings.length; p++) {
        var h = pageHeadings[p];
        var lvl = parseInt(h.tagName.charAt(1), 10);
        var text = h.textContent.trim();
        if (!text) { continue; }

        /* Assurer un id pour le lien */
        if (!h.id) {
          h.id = 'heading-' + p;
        }

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = text;
        a.addEventListener('click', function() {
          panel.classList.remove('open');
          overlay.classList.remove('open');
        });

        if (lvl > lastLevel) {
          var sub = document.createElement('ul');
          if (stack[stack.length - 1].lastChild) {
            stack[stack.length - 1].lastChild.appendChild(sub);
          }
          stack.push(sub);
        } else if (lvl < lastLevel) {
          var diff = lastLevel - lvl;
          for (var d = 0; d < diff; d++) {
            if (stack.length > 1) { stack.pop(); }
          }
        }

        li.appendChild(a);
        stack[stack.length - 1].appendChild(li);
        lastLevel = lvl;
      }

      panel.appendChild(tocList);
      document.body.appendChild(panel);

      function closeToc() {
        panel.classList.remove('open');
        overlay.classList.remove('open');
      }

      overlay.addEventListener('click', closeToc);
      closeBtn.addEventListener('click', closeToc);
    }
  }

  /* --- Barre accessibilite --- */
  var bar = document.createElement('div');
  bar.id = 'accessibility-bar';

  var barHtml = '';

  if (hasToc) {
    barHtml += '<button id="toc-toggle">Plan</button>';
  }

  barHtml += '<select id="font-select" title="Police"><option value="default">Libertinus Serif</option><option value="sans">Inter (sans-serif)</option><option value="hyperlegible">Atkinson Hyperlegible (malvoyants)</option><option value="opendyslexic">OpenDyslexic (dyslexie)</option></select>';

  bar.innerHTML = barHtml;
  document.body.appendChild(bar);

  /* Bouton Plan */
  if (hasToc) {
    var tocToggle = document.getElementById('toc-toggle');
    tocToggle.addEventListener('click', function() {
      var p = document.getElementById('toc-panel');
      var o = document.getElementById('toc-overlay');
      p.classList.toggle('open');
      o.classList.toggle('open');
    });
  }

  /* Selecteur de police */
  var fontSelect = document.getElementById('font-select');
  var savedFont = localStorage.getItem('fontChoice') || 'default';
  fontSelect.value = savedFont;

  function applyFont(f) {
    document.body.classList.remove('font-sans', 'font-hyperlegible', 'font-opendyslexic');
    if (f === 'sans') { document.body.classList.add('font-sans'); }
    if (f === 'hyperlegible') { document.body.classList.add('font-hyperlegible'); }
    if (f === 'opendyslexic') { document.body.classList.add('font-opendyslexic'); }
  }
  applyFont(savedFont);

  fontSelect.addEventListener('change', function() {
    localStorage.setItem('fontChoice', this.value);
    applyFont(this.value);
  });

  /* --- Sections pliables --- */
  if (content) {
    var allHeadings = content.querySelectorAll('h1, h2, h3, h4');
    if (allHeadings.length >= 4) {

      var i, heading, level, wrapper, sibling, nextSib, siblingLevel;

      for (i = 0; i < allHeadings.length; i++) {
        heading = allHeadings[i];
        heading.classList.add('collapsible-heading', 'open');
        level = parseInt(heading.tagName.charAt(1), 10);
        wrapper = document.createElement('div');
        wrapper.className = 'collapsible-content';
        sibling = heading.nextElementSibling;

        while (sibling) {
          if (sibling.tagName && /^H[1-6]$/.test(sibling.tagName)) {
            siblingLevel = parseInt(sibling.tagName.charAt(1), 10);
            if (siblingLevel <= level) { break; }
          }
          nextSib = sibling.nextElementSibling;
          wrapper.appendChild(sibling);
          sibling = nextSib;
        }

        if (wrapper.children.length > 0) {
          heading.parentNode.insertBefore(wrapper, heading.nextSibling);
        }

        heading.addEventListener('click', function() {
          this.classList.toggle('open');
          var c = this.nextElementSibling;
          if (c && c.classList.contains('collapsible-content')) {
            c.classList.toggle('collapsed');
          }
        });
      }

      /* Bouton tout plier / deplier */
      var toggleAllBtn = document.createElement('button');
      toggleAllBtn.id = 'toggle-all';
      toggleAllBtn.textContent = 'Tout replier';
      bar.insertBefore(toggleAllBtn, bar.querySelector('#font-select'));

      var allOpen = true;

      toggleAllBtn.addEventListener('click', function() {
        var sections = content.querySelectorAll('.collapsible-content');
        var heads = content.querySelectorAll('.collapsible-heading');

        if (allOpen) {
          for (var j = 0; j < sections.length; j++) {
            sections[j].classList.add('collapsed');
          }
          for (var k = 0; k < heads.length; k++) {
            heads[k].classList.remove('open');
          }
          toggleAllBtn.textContent = 'Tout d\u00e9plier';
          allOpen = false;
        } else {
          for (var j = 0; j < sections.length; j++) {
            sections[j].classList.remove('collapsed');
          }
          for (var k = 0; k < heads.length; k++) {
            heads[k].classList.add('open');
          }
          toggleAllBtn.textContent = 'Tout replier';
          allOpen = true;
        }
      });
    }
  }
});
</script>
{% endraw %}
