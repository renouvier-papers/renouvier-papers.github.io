{% raw %}
<link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
  font-weight: normal; font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Bold.woff') format('woff');
  font-weight: bold; font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Italic.woff') format('woff');
  font-weight: normal; font-style: italic;
}

/* === POLICE PAR DEFAUT === */
body {
  font-family: 'Libertinus Serif', serif !important;
  font-size: 1.1rem;
  line-height: 1.7;
}
.side-bar, .side-bar * { font-size: 0.85rem; }

body.font-hyperlegible, body.font-hyperlegible * {
  font-family: 'Atkinson Hyperlegible', sans-serif !important;
}
body.font-hyperlegible { font-size: 1.05rem; }

body.font-opendyslexic, body.font-opendyslexic * {
  font-family: 'OpenDyslexic', sans-serif !important;
}
body.font-opendyslexic { font-size: 1rem; }

/* === MODE CLAIR (defaut) === */
body {
  --bg: #faf8f5;
  --bg-sidebar: #f3f0eb;
  --text: #2d2d2d;
  --text-muted: #777;
  --h1-color: #5b3e96;
  --h2-color: #2a7a6f;
  --h3-color: #b5651d;
  --h4-color: #3a5ea6;
  --link: #7253ed;
  --link-hover: #5a3fd6;
  --accent: #7253ed;
  --border: #e0dcd6;
  --quote-bg: #f0eee9;
  --quote-border: #7253ed;
  --bar-bg: #f5f5f5;
  --bar-text: #333;
  --bar-border: #ccc;
  --panel-bg: #fff;
  --toc-link: #555;
}

/* === MODE SOMBRE === */
body.theme-dark {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --text: #d4d4d4;
  --text-muted: #888;
  --h1-color: #c586c0;
  --h2-color: #4ec9b0;
  --h3-color: #ce9178;
  --h4-color: #569cd6;
  --link: #6db3f2;
  --link-hover: #8cc5ff;
  --accent: #c586c0;
  --border: #30363d;
  --quote-bg: #161b22;
  --quote-border: #c586c0;
  --bar-bg: #21262d;
  --bar-text: #d4d4d4;
  --bar-border: #444;
  --panel-bg: #161b22;
  --toc-link: #aaa;
}

/* === MODE DALTONIEN JOUR === */
body.theme-cb-light {
  --bg: #faf8f5;
  --bg-sidebar: #f3f0eb;
  --text: #2d2d2d;
  --text-muted: #777;
  --h1-color: #0072B2;
  --h2-color: #E69F00;
  --h3-color: #CC79A7;
  --h4-color: #56B4E9;
  --link: #0072B2;
  --link-hover: #005080;
  --accent: #0072B2;
  --border: #e0dcd6;
  --quote-bg: #f0eee9;
  --quote-border: #0072B2;
  --bar-bg: #f5f5f5;
  --bar-text: #333;
  --bar-border: #ccc;
  --panel-bg: #fff;
  --toc-link: #555;
}

/* === MODE DALTONIEN NUIT === */
body.theme-cb-dark {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --text: #d4d4d4;
  --text-muted: #888;
  --h1-color: #56B4E9;
  --h2-color: #E69F00;
  --h3-color: #CC79A7;
  --h4-color: #009E73;
  --link: #56B4E9;
  --link-hover: #7cc8f0;
  --accent: #56B4E9;
  --border: #30363d;
  --quote-bg: #161b22;
  --quote-border: #56B4E9;
  --bar-bg: #21262d;
  --bar-text: #d4d4d4;
  --bar-border: #444;
  --panel-bg: #161b22;
  --toc-link: #aaa;
}

/* === APPLICATION DES VARIABLES === */
body {
  background-color: var(--bg) !important;
  color: var(--text) !important;
}
.side-bar {
  background-color: var(--bg-sidebar) !important;
  border-right: 1px solid var(--border) !important;
}
.side-bar, .side-bar * { color: var(--text) !important; }
.site-title { color: var(--accent) !important; }
.main-content { background-color: var(--bg) !important; }
.main-content a { color: var(--link) !important; }
.main-content a:hover { color: var(--link-hover) !important; }
.main-content h1 { color: var(--h1-color) !important; }
.main-content h2 { color: var(--h2-color) !important; }
.main-content h3 { color: var(--h3-color) !important; }
.main-content h4 { color: var(--h4-color) !important; }

.main-content blockquote {
  background-color: var(--quote-bg) !important;
  border-left: 4px solid var(--quote-border) !important;
  color: var(--text) !important;
  padding: 12px 16px;
}

.main-content table th {
  background-color: var(--bg-sidebar) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.main-content table td {
  color: var(--text) !important;
  border-color: var(--border) !important;
}

.main-content code {
  background-color: var(--bg-sidebar) !important;
  color: var(--text) !important;
}

.search-input {
  background-color: var(--bg) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}

.navigation-list-link { color: var(--text) !important; }
.navigation-list-link.active { color: var(--accent) !important; font-weight: 600; }

.breadcrumb-nav, .breadcrumb-nav * { color: var(--text-muted) !important; }
.breadcrumb-nav a { color: var(--link) !important; }

/* Pied de page */
.main-content-wrap + * { color: var(--text-muted) !important; }
.main-content-wrap + * a { color: var(--link) !important; }

/* Cacher le footer de la sidebar */
.site-footer.d-md-block { display: none !important; }

/* === PANNEAU PLAN === */
#toc-overlay {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 10000;
}
#toc-overlay.open { display: block; }

#toc-panel {
  position: fixed; top: 0; right: -400px;
  width: 380px; max-width: 85vw; height: 100%;
  background: var(--panel-bg); z-index: 10001;
  overflow-y: auto; padding: 24px 20px;
  box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  transition: right 0.25s ease;
  font-size: 0.88rem; line-height: 1.5;
}
#toc-panel.open { right: 0; }
#toc-panel .toc-panel-title {
  font-weight: 700; font-size: 1rem;
  color: var(--accent); margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 2px solid var(--accent);
}
#toc-panel ul { list-style: none; padding-left: 0; margin: 0; }
#toc-panel ul ul { padding-left: 16px; margin-top: 2px; }
#toc-panel li { margin-bottom: 4px; }
#toc-panel a { color: var(--toc-link); text-decoration: none; display: block; padding: 2px 0; }
#toc-panel a:hover { color: var(--accent); }
#toc-panel .toc-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; font-size: 1.4rem;
  cursor: pointer; color: var(--text-muted); padding: 4px 8px;
}
#toc-panel .toc-close:hover { color: var(--text); }

/* === BARRE ACCESSIBILITE === */
#accessibility-bar {
  position: fixed; bottom: 12px; right: 12px;
  z-index: 9999; display: flex; gap: 6px; font-size: 13px;
}
#accessibility-bar select,
#accessibility-bar button {
  border: 1px solid var(--bar-border);
  border-radius: 4px; padding: 4px 10px;
  cursor: pointer; font-size: 13px;
  background: var(--bar-bg); color: var(--bar-text);
  font-family: sans-serif !important;
}
#accessibility-bar button#toc-toggle {
  background: var(--accent); color: #fff;
  border-color: var(--accent); font-weight: 600;
}
#accessibility-bar button#toc-toggle:hover { opacity: 0.85; }

/* === SECTIONS PLIABLES === */
.collapsible-heading {
  cursor: pointer; user-select: none;
  position: relative; padding-left: 1.2em;
}
.collapsible-heading::before {
  content: '\25B8'; position: absolute; left: 0;
  transition: transform 0.2s;
}
.collapsible-heading.open::before { transform: rotate(90deg); }
.collapsible-content.collapsed { display: none; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  /* --- Cacher "Table of contents" auto --- */
  var headings2 = document.querySelectorAll('.main-content h2');
  for (var t = 0; t < headings2.length; t++) {
    if (headings2[t].textContent.trim() === 'Table of contents') {
      var nxt = headings2[t].nextElementSibling;
      headings2[t].style.display = 'none';
      if (nxt && nxt.tagName === 'UL') { nxt.style.display = 'none'; }
    }
  }

  /* --- Construire le plan --- */
  var content = document.getElementById('main-content');
  if (!content) { content = document.querySelector('.main-content'); }
  var hasToc = false;

  if (content) {
    var pageHeadings = content.querySelectorAll('h1, h2, h3, h4');
    if (pageHeadings.length >= 4) {
      hasToc = true;

      var overlay = document.createElement('div');
      overlay.id = 'toc-overlay';
      document.body.appendChild(overlay);

      var panel = document.createElement('div');
      panel.id = 'toc-panel';

      var closeBtn = document.createElement('button');
      closeBtn.className = 'toc-close';
      closeBtn.innerHTML = '&times;';
      panel.appendChild(closeBtn);

      var panelTitle = document.createElement('div');
      panelTitle.className = 'toc-panel-title';
      panelTitle.textContent = 'Plan';
      panel.appendChild(panelTitle);

      var tocList = document.createElement('ul');
      var stack = [tocList];
      var lastLevel = 1;

      for (var p = 0; p < pageHeadings.length; p++) {
        var hd = pageHeadings[p];
        var lvl = parseInt(hd.tagName.charAt(1), 10);
        var text = hd.textContent.trim();
        if (!text) { continue; }
        if (!hd.id) { hd.id = 'heading-' + p; }

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + hd.id;
        a.textContent = text;
        a.addEventListener('click', function() {
          panel.classList.remove('open');
          overlay.classList.remove('open');
        });

        if (lvl > lastLevel) {
          var sub = document.createElement('ul');
          if (stack[stack.length - 1].lastChild) {
            stack[stack.length - 1].lastChild.appendChild(sub);
          }
          stack.push(sub);
        } else if (lvl < lastLevel) {
          var diff = lastLevel - lvl;
          for (var d = 0; d < diff; d++) {
            if (stack.length > 1) { stack.pop(); }
          }
        }

        li.appendChild(a);
        stack[stack.length - 1].appendChild(li);
        lastLevel = lvl;
      }

      panel.appendChild(tocList);
      document.body.appendChild(panel);

      function closeToc() {
        panel.classList.remove('open');
        overlay.classList.remove('open');
      }
      overlay.addEventListener('click', closeToc);
      closeBtn.addEventListener('click', closeToc);
    }
  }

  /* --- Barre accessibilite --- */
  var bar = document.createElement('div');
  bar.id = 'accessibility-bar';
  var barHtml = '';
  if (hasToc) { barHtml += '<button id="toc-toggle">Plan</button>'; }
  barHtml += '<select id="theme-select" title="Affichage"><option value="light">Clair</option><option value="dark">Sombre</option><option value="cb-light">Daltonien jour</option><option value="cb-dark">Daltonien nuit</option></select>';
  barHtml += '<select id="font-select" title="Police"><option value="default">Libertinus Serif</option><option value="hyperlegible">Atkinson Hyperlegible</option><option value="opendyslexic">OpenDyslexic</option></select>';
  bar.innerHTML = barHtml;
  document.body.appendChild(bar);

  /* Bouton Plan */
  if (hasToc) {
    document.getElementById('toc-toggle').addEventListener('click', function() {
      document.getElementById('toc-panel').classList.toggle('open');
      document.getElementById('toc-overlay').classList.toggle('open');
    });
  }

  /* Selecteur de theme */
  var themeSelect = document.getElementById('theme-select');
  var savedTheme = localStorage.getItem('themeChoice') || 'light';
  themeSelect.value = savedTheme;

  function applyTheme(t) {
    document.body.classList.remove('theme-dark', 'theme-cb-light', 'theme-cb-dark');
    if (t === 'dark') { document.body.classList.add('theme-dark'); }
    if (t === 'cb-light') { document.body.classList.add('theme-cb-light'); }
    if (t === 'cb-dark') { document.body.classList.add('theme-cb-dark'); }
  }
  applyTheme(savedTheme);

  themeSelect.addEventListener('change', function() {
    localStorage.setItem('themeChoice', this.value);
    applyTheme(this.value);
  });

  /* Selecteur de police */
  var fontSelect = document.getElementById('font-select');
  var savedFont = localStorage.getItem('fontChoice') || 'default';
  fontSelect.value = savedFont;

  function applyFont(f) {
    document.body.classList.remove('font-hyperlegible', 'font-opendyslexic');
    if (f === 'hyperlegible') { document.body.classList.add('font-hyperlegible'); }
    if (f === 'opendyslexic') { document.body.classList.add('font-opendyslexic'); }
  }
  applyFont(savedFont);

  fontSelect.addEventListener('change', function() {
    localStorage.setItem('fontChoice', this.value);
    applyFont(this.value);
  });

  /* --- Sections pliables --- */
  if (content) {
    var allH = content.querySelectorAll('h1, h2, h3, h4');
    if (allH.length >= 4) {
      var i, hh, lv, wr, sib, nxs, slv;

      for (i = 0; i < allH.length; i++) {
        hh = allH[i];
        hh.classList.add('collapsible-heading', 'open');
        lv = parseInt(hh.tagName.charAt(1), 10);
        wr = document.createElement('div');
        wr.className = 'collapsible-content';
        sib = hh.nextElementSibling;

        while (sib) {
          if (sib.tagName && /^H[1-6]$/.test(sib.tagName)) {
            slv = parseInt(sib.tagName.charAt(1), 10);
            if (slv <= lv) { break; }
          }
          nxs = sib.nextElementSibling;
          wr.appendChild(sib);
          sib = nxs;
        }

        if (wr.children.length > 0) {
          hh.parentNode.insertBefore(wr, hh.nextSibling);
        }

        hh.addEventListener('click', function() {
          this.classList.toggle('open');
          var c = this.nextElementSibling;
          if (c && c.classList.contains('collapsible-content')) {
            c.classList.toggle('collapsed');
          }
        });
      }

      /* Bouton tout plier / deplier */
      var toggleAllBtn = document.createElement('button');
      toggleAllBtn.id = 'toggle-all';
      toggleAllBtn.textContent = 'Tout replier';
      bar.insertBefore(toggleAllBtn, document.getElementById('theme-select'));

      var allOpen = true;
      toggleAllBtn.addEventListener('click', function() {
        var secs = content.querySelectorAll('.collapsible-content');
        var hds = content.querySelectorAll('.collapsible-heading');
        if (allOpen) {
          for (var j = 0; j < secs.length; j++) { secs[j].classList.add('collapsed'); }
          for (var k = 0; k < hds.length; k++) { hds[k].classList.remove('open'); }
          toggleAllBtn.textContent = 'Tout d\u00e9plier';
          allOpen = false;
        } else {
          for (var j = 0; j < secs.length; j++) { secs[j].classList.remove('collapsed'); }
          for (var k = 0; k < hds.length; k++) { hds[k].classList.add('open'); }
          toggleAllBtn.textContent = 'Tout replier';
          allOpen = true;
        }
      });
    }
  }
});
</script>
