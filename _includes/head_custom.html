{% raw %}
<link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
}
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Italic.woff') format('woff');
  font-weight: normal;
  font-style: italic;
}

/* Police par defaut : Libertinus Serif */
body {
  font-family: 'Libertinus Serif', serif !important;
  font-size: 1.1rem;
  line-height: 1.7;
}
.side-bar,
.side-bar * {
  font-size: 0.85rem;
}

/* Sans-serif */
body.font-sans,
body.font-sans * {
  font-family: 'Inter', sans-serif !important;
}
body.font-sans {
  font-size: 1rem;
}

/* Malvoyants */
body.font-hyperlegible,
body.font-hyperlegible * {
  font-family: 'Atkinson Hyperlegible', sans-serif !important;
}
body.font-hyperlegible {
  font-size: 1.05rem;
}

/* Dyslexie */
body.font-opendyslexic,
body.font-opendyslexic * {
  font-family: 'OpenDyslexic', sans-serif !important;
}
body.font-opendyslexic {
  font-size: 1rem;
}

/* Plan flottant a droite */
#floating-toc {
  display: none;
}

@media (min-width: 1200px) {
  #floating-toc {
    display: block;
    position: fixed;
    top: 80px;
    right: 20px;
    width: 240px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    font-size: 0.78rem;
    line-height: 1.4;
    border-left: 2px solid #7253ed;
    padding-left: 12px;
  }
  #floating-toc .floating-toc-title {
    font-weight: 700;
    margin-bottom: 8px;
    color: #7253ed;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #floating-toc ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }
  #floating-toc ul ul {
    padding-left: 12px;
  }
  #floating-toc li {
    margin-bottom: 3px;
  }
  #floating-toc a {
    color: #555;
    text-decoration: none;
  }
  #floating-toc a:hover {
    color: #7253ed;
  }
  #floating-toc a.active {
    color: #7253ed;
    font-weight: 600;
  }

  /* Reduire la largeur du contenu pour laisser la place au plan */
  .main-content {
    max-width: calc(100% - 280px) !important;
  }
}

/* Cacher le footer de la sidebar */
.site-footer.d-md-block { display: none !important; }

/* Barre accessibilite */
#accessibility-bar {
  position: fixed;
  bottom: 12px;
  right: 12px;
  z-index: 9999;
  display: flex;
  gap: 6px;
  font-size: 13px;
}
#accessibility-bar select,
#accessibility-bar button {
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
  background: #f5f5f5;
  color: #333;
  font-family: sans-serif !important;
}

/* Sections pliables */
.collapsible-heading {
  cursor: pointer;
  user-select: none;
  position: relative;
  padding-left: 1.2em;
}
.collapsible-heading::before {
  content: '\25B8';
  position: absolute;
  left: 0;
  transition: transform 0.2s;
}
.collapsible-heading.open::before {
  transform: rotate(90deg);
}
.collapsible-content.collapsed {
  display: none;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

  /* --- Cacher "Table of contents" auto --- */
  var tocs = document.querySelectorAll('.main-content h2');
  for (var t = 0; t < tocs.length; t++) {
    if (tocs[t].textContent.trim() === 'Table of contents') {
      var tocNext = tocs[t].nextElementSibling;
      tocs[t].style.display = 'none';
      if (tocNext && tocNext.tagName === 'UL') {
        tocNext.style.display = 'none';
      }
    }
  }

  /* --- Plan flottant a droite --- */
  var tocSource = document.querySelector('#markdown-toc');
  if (tocSource) {
    var floatingToc = document.createElement('div');
    floatingToc.id = 'floating-toc';
    var tocTitle = document.createElement('div');
    tocTitle.className = 'floating-toc-title';
    tocTitle.textContent = 'Plan';
    floatingToc.appendChild(tocTitle);
    var tocClone = tocSource.cloneNode(true);
    tocClone.removeAttribute('id');
    floatingToc.appendChild(tocClone);
    document.body.appendChild(floatingToc);

    /* Surligner la section active au scroll */
    var tocLinks = floatingToc.querySelectorAll('a');
    var headingIds = [];
    for (var h = 0; h < tocLinks.length; h++) {
      var href = tocLinks[h].getAttribute('href');
      if (href && href.charAt(0) === '#') {
        headingIds.push({ id: href.substring(1), link: tocLinks[h] });
      }
    }

    function updateActiveToc() {
      var scrollPos = window.scrollY + 100;
      var activeLink = null;
      for (var j = 0; j < headingIds.length; j++) {
        var el = document.getElementById(headingIds[j].id);
        if (el && el.offsetTop <= scrollPos) {
          activeLink = headingIds[j].link;
        }
      }
      for (var k = 0; k < tocLinks.length; k++) {
        tocLinks[k].classList.remove('active');
      }
      if (activeLink) {
        activeLink.classList.add('active');
      }
    }

    window.addEventListener('scroll', updateActiveToc);
    updateActiveToc();
  }

  /* --- Selecteur de police --- */
  var bar = document.createElement('div');
  bar.id = 'accessibility-bar';
  bar.innerHTML = '<select id="font-select" title="Police"><option value="default">Libertinus Serif</option><option value="sans">Inter (sans-serif)</option><option value="hyperlegible">Atkinson Hyperlegible (malvoyants)</option><option value="opendyslexic">OpenDyslexic (dyslexie)</option></select>';
  document.body.appendChild(bar);

  var fontSelect = document.getElementById('font-select');
  var savedFont = localStorage.getItem('fontChoice') || 'default';
  fontSelect.value = savedFont;

  function applyFont(f) {
    document.body.classList.remove('font-sans', 'font-hyperlegible', 'font-opendyslexic');
    if (f === 'sans') { document.body.classList.add('font-sans'); }
    if (f === 'hyperlegible') { document.body.classList.add('font-hyperlegible'); }
    if (f === 'opendyslexic') { document.body.classList.add('font-opendyslexic'); }
  }
  applyFont(savedFont);

  fontSelect.addEventListener('change', function() {
    localStorage.setItem('fontChoice', this.value);
    applyFont(this.value);
  });

  /* --- Sections pliables --- */
  var content = document.getElementById('main-content');
  if (!content) { content = document.querySelector('.main-content'); }
  if (!content) { return; }

  var allHeadings = content.querySelectorAll('h1, h2, h3, h4');
  if (allHeadings.length < 4) { return; }

  var i, heading, level, wrapper, sibling, nextSib, siblingLevel;

  for (i = 0; i < allHeadings.length; i++) {
    heading = allHeadings[i];
    heading.classList.add('collapsible-heading', 'open');
    level = parseInt(heading.tagName.charAt(1), 10);
    wrapper = document.createElement('div');
    wrapper.className = 'collapsible-content';
    sibling = heading.nextElementSibling;

    while (sibling) {
      if (sibling.tagName && /^H[1-6]$/.test(sibling.tagName)) {
        siblingLevel = parseInt(sibling.tagName.charAt(1), 10);
        if (siblingLevel <= level) { break; }
      }
      nextSib = sibling.nextElementSibling;
      wrapper.appendChild(sibling);
      sibling = nextSib;
    }

    if (wrapper.children.length > 0) {
      heading.parentNode.insertBefore(wrapper, heading.nextSibling);
    }

    heading.addEventListener('click', function() {
      this.classList.toggle('open');
      var c = this.nextElementSibling;
      if (c && c.classList.contains('collapsible-content')) {
        c.classList.toggle('collapsed');
      }
    });
  }

  /* --- Bouton tout plier / deplier --- */
  if (allHeadings.length >= 4) {
    var toggleAllBtn = document.createElement('button');
    toggleAllBtn.id = 'toggle-all';
    toggleAllBtn.textContent = 'Tout replier';
    bar.insertBefore(toggleAllBtn, bar.firstChild);

    var allOpen = true;

    toggleAllBtn.addEventListener('click', function() {
      var sections = content.querySelectorAll('.collapsible-content');
      var heads = content.querySelectorAll('.collapsible-heading');

      if (allOpen) {
        for (var j = 0; j < sections.length; j++) {
          sections[j].classList.add('collapsed');
        }
        for (var k = 0; k < heads.length; k++) {
          heads[k].classList.remove('open');
        }
        toggleAllBtn.textContent = 'Tout d\u00e9plier';
        allOpen = false;
      } else {
        for (var j = 0; j < sections.length; j++) {
          sections[j].classList.remove('collapsed');
        }
        for (var k = 0; k < heads.length; k++) {
          heads[k].classList.add('open');
        }
        toggleAllBtn.textContent = 'Tout replier';
        allOpen = true;
      }
    });
  }
});
</script>
{% endraw %}
